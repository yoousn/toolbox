name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        shell: cmd
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "toolbox" --add-data "qml;qml" main.py

      - name: Zip output
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\toolbox" -DestinationPath "dist\toolbox-${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/toolbox-${{ github.ref_name }}.zip
          generate_release_notes: true

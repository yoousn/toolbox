name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install UPX
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip" -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath upx
          Copy-Item upx\upx-4.2.4-win64\upx.exe -Destination .

      - name: Build exe
        shell: cmd
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "toolbox" --icon "app.ico" --upx-dir . --add-data "qml;qml" --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module tkinter --exclude-module matplotlib --exclude-module scipy --exclude-module PySide6.QtWebEngine --exclude-module PySide6.Qt3D --exclude-module PySide6.QtBluetooth --exclude-module PySide6.QtMultimedia --exclude-module PySide6.QtSensors --exclude-module PySide6.QtSerialPort --exclude-module PySide6.QtTest --exclude-module PySide6.QtPdf main.py

      - name: Smoke test
        shell: cmd
        run: |
          dist\toolbox\toolbox.exe --version || echo "Smoke test: exe launched"
        timeout-minutes: 1
        continue-on-error: true

      - name: Zip output
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\toolbox" -DestinationPath "dist\toolbox-${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/toolbox-${{ github.ref_name }}.zip
          generate_release_notes: true
